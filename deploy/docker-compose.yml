services:
  gpt-image-playground:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: gpt-image-playground:local
    container_name: gpt-image-playground
    environment:
      APP_LOGIN_KEY: ${APP_LOGIN_KEY:-change-me}
      APP_SECRET: ${APP_SECRET:-change-me-to-a-long-random-secret}
      DATA_DIR: /data
      SERVER_REQUEST_TIMEOUT_SECONDS: ${SERVER_REQUEST_TIMEOUT_SECONDS:-900}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:39022:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    restart: unless-stopped
    networks:
      - chat2Api

networks:
  chat2Api:
    external: true
